name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'taxonomy.yaml'
      - 'classification/snapshot.csv'
      - 'validation/numbers.json'
      - 'scripts/build_viz_data.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate viz data
        run: python scripts/build_viz_data.py

      - name: Verify docs/data not stale
        run: |
          if [ -n "$(git status --porcelain docs/data/)" ]; then
            echo "ERROR: docs/data/ is stale — run scripts/build_viz_data.py and commit."
            git diff docs/data/
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
