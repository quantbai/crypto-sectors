# =============================================================================
# crypto-sectors taxonomy
# =============================================================================
# Single flat `sector` classification field for the 232-coin OKX crypto-native
# perpetual universe. Empirically validated for cross-sectional group_neut-style
# factor neutralization.
#
# This file is the source of truth for label definitions, precedence / boundary
# rules, and FACTOR/RESIDUAL governance. classification/sector.csv is the
# authoritative per-asset mapping (232 rows); scripts/validate_schema.py asserts
# referential integrity between the two.
#
# License: Data (this file + classification/) CC BY 4.0; Code (scripts/) MIT.
# =============================================================================

release_date: "2026-06-20"

# =============================================================================
# SECTOR LABELS  (13 flat labels, one per asset, no hierarchy)
# =============================================================================
# Design principle: classify each token by its UNDERLYING MECHANISM — what the
# whitepaper and on-chain code actually implement — NOT by the application
# narrative the project markets. "AI" and "media/content" are cross-cutting
# narratives, not mechanisms; the ai_infrastructure and media_content labels were
# DISSOLVED (2026-06-20) and their members redistributed by mechanism (see Rule 11
# and decisions/dissolve-ai-narrative.md). Assignment is economics-first
# (whitepaper + chain data; no return history needed on day one); validated for
# group_neut variance reduction at the 10,000-perm standard on the 232-coin OKX
# perpetual universe.
#
# Variance-reduction figures (10k-perm, production OTHER-collapse kernel) live in
# validation/sector_okx/REPORT.md (single source; not duplicated here to avoid drift).
#
# NOT A RISK MODEL: this is a validated classification (an input to a risk model's
# exposure matrix), not a covariance / factor risk model.
# =============================================================================

labels:

  # ---------------------------------------------------------------------------
  # FACTOR labels — strong cohesion (mean intra-group market-residual corr
  # vs 10k-perm null; see validation/sector_okx/cohesion_sector.csv)
  # ---------------------------------------------------------------------------

  - name: privacy
    cohesion_mean_resid_corr: +0.55
    role: FACTOR
    definition: >
      Native currencies of chains where transaction-level privacy is the primary
      protocol feature (mandatory or opt-in CoinJoin / shielded pools). The cleanest
      cluster in the universe (~0.99 pairwise). Shared regulatory / delisting tail
      risk is the decisive co-movement driver, which is mechanism-relevant, not
      narrative.
    members_snapshot: [zec, dash, zen]

  - name: value_transfer
    cohesion_mean_resid_corr: +0.23
    role: FACTOR
    definition: >
      Native currencies of non-smart-contract chains whose primary purpose is store
      of value and payment / settlement, including bank-rail remittance coins (xrp,
      xlm) and open settlement rails with NO single off-chain operator. Value accrues
      from monetary-premium adoption of the chain as a payment network; there is no
      application-layer cash flow to price. TRX is here (not captive_franchise):
      its value accrual is chain-native USDT-settlement fee / burn — an OPEN rail with
      no single captive operator, unlike bnb / cro. The captive vs value_transfer
      discriminator is "is there a single captive off-chain operator feeding the flow?"
      — trx = no.
    members_snapshot: [btc, bch, ltc, xrp, xlm, trx, rvn]

  - name: captive_franchise
    cohesion_mean_resid_corr: +0.17
    role: FACTOR
    definition: >
      Tokens whose value is captured OFF-chain by a SINGLE operator and recycled to
      holders via burns / buybacks / discounts / discretionary revenue-share. The
      single-captive-operator test is decisive and unifies what were three apparent
      sub-types: centralized exchange equity (bnb / Binance, cro / Crypto.com, okb /
      OKX), a messenger-franchise chain (ton / Telegram, which is also the largest
      validator), a single-company fund tournament (nmr / Numerai — off-chain scoring,
      buybacks over fiat AUM), and a single-company NFT-marketplace operator (me /
      Magic Eden — discretionary buyback from off-chain company revenue, no in-world
      utility). Ex-ante floor: operator has realized captive flow AND a live fee / burn
      or buyback linkage. Operator identity beats host chain. Note: okb and cro are
      classified here but flagged out of the tradable universe (exchange-token-on-its-
      own-venue circularity); bnb is retained (we trade on OKX, not Binance).
    members_snapshot: [bnb, cro, okb, ton, nmr, me]

  - name: compute_storage
    cohesion_mean_resid_corr: +0.06
    role: FACTOR
    definition: >
      Decentralized PHYSICAL-RESOURCE marketplaces / DePINs selling compute (CPU /
      GPU), storage, or bandwidth — the token is the metered payment-and-settlement
      unit and / or the slashable provider / validator stake. The metered resource
      type (GPU vs disk vs bandwidth) is NOT a sector boundary, and the settlement
      style (burn-or-lock vs pay-the-provider) is NOT a sector boundary: a GPU-render
      market (render), a GPU-cloud DePIN (ath / Aethir), a P2P compute market (glm /
      Golem), a bandwidth DePIN (grass), a metered transcode / AI-video market (lpt /
      Livepeer), and burn-for-resource storage / compute (fil, ar, wal, icp) are one
      mechanism. icp carries a sovereign-L1 form but the cycles-burn cloud-compute
      mechanism IS its token economics (Rule 9). This widens the prior "burn-or-lock
      only" definition: paid-provider GPU markets (formerly mislabelled ai_infra) are
      the SAME mechanism as storage markets and are unified here.
    members_snapshot: [fil, ar, icp, wal, render, glm, ath, grass, lpt]

  - name: meme
    cohesion_mean_resid_corr: +0.09
    role: FACTOR
    definition: >
      Tokens whose value is driven by social-community attention rather than any
      cash-flow, fee, or utility claim to the holder. The test is the ABSENCE of a
      value-accrual mechanism to holders — NOT the absence of a product. A token can
      have a live product / L2 and still be meme if holders capture nothing: zora
      runs a live content-coin L2 but the fee split sends passive holders nothing and
      the team officially calls the token "for fun only" — pure attention, so meme.
      Meme identity beats host chain (bonk / wif / pengu stay meme despite Solana).
    members_snapshot: [doge, shib, pepe, bonk, wif, floki, pengu, trump, spx, zora]

  # ---------------------------------------------------------------------------
  # FACTOR labels — weak but statistically significant cohesion
  # ---------------------------------------------------------------------------

  - name: eth_scaling
    cohesion_mean_resid_corr: +0.04
    role: FACTOR
    definition: >
      Tokens of rollups and validity layers that process transactions off Ethereum
      and settle to it for security; levered claims on Ethereum blockspace demand
      minus the L1's own value capture. The test is settlement dependence on Ethereum.
      Sidechains with their own validator sets are NOT eth_scaling even if EVM-
      compatible: pol runs its own validator set and is smart_contract_platform.
    members_snapshot: [arb, op, strk, zk, linea, celo, metis, soon, soph, plume]

  - name: metaverse_gaming
    cohesion_mean_resid_corr: +0.04
    role: FACTOR
    definition: >
      Tokens of virtual worlds, blockchain games, gaming infrastructure, and fan /
      NFT engagement platforms. Value accrues from consumer-entertainment spend inside
      tokenized game and fan economies — a discretionary-consumption driver distinct
      from financial protocols and infrastructure. kgen (verified-gamer distribution;
      AI is a data buyer) and magic (cross-game currency; AI agents are gameplay
      features) stay here, not elsewhere: AI is a client vertical, not the mechanism.
      An NFT MARKETPLACE is not a game economy: me (Magic Eden) is captive_franchise
      (operator buyback), not metaverse_gaming.
    members_snapshot: [sand, mana, axs, gala, imx, ape, chz, ygg, enj]

  - name: interoperability
    cohesion_mean_resid_corr: +0.03
    role: FACTOR
    definition: >
      Tokens securing cross-chain messaging, shared security, modular data
      availability, and build-your-own-chain hubs. Value accrues from other chains
      renting security, data availability, or message-passing. Honestly weak cohesion
      (0.03); kept separate because renting infrastructure to other chains is
      economically distinct from running a single application economy. baby and init
      are here (2026-06-17 audit): modular / shared-security infra, not sovereign-
      consensus L1s.
    members_snapshot: [dot, atom, tia, zro, baby, init, ksm, w]

  # ---------------------------------------------------------------------------
  # FACTOR label — marginal cohesion (significant only because large n tightens
  # the null; mostly market beta — treat with caution for group_neut)
  # ---------------------------------------------------------------------------

  - name: smart_contract_platform
    cohesion_mean_resid_corr: +0.010
    role: FACTOR
    definition: >
      Sovereign-consensus general-purpose L1 (or L1-equivalent) gas / staking tokens.
      Value accrues from fee / burn and staking demand generated by the chain's own
      application ecosystem. An "AI chain" that is fundamentally a sovereign L1 belongs
      HERE — the AI narrative does not override the L1 mechanism: 0g (modular L1 whose
      storage / compute / DA modules settle THROUGH the chain), kite (L1 for agent
      payments; settlement is in stablecoins, not the gas token), tao (Bittensor's
      Subtensor L1; ML subnets are apps on the chain), theta (L1 secured by THETA
      staking; EdgeCloud fees are TFUEL, not THETA), vana (data-DAO L1). pol is here
      (own validator set, not eth_scaling). ip is here (Story is a sovereign L1; IP
      licensing is an app). The big-bucket caveat applies: at n~45 most co-movement is
      market beta; cohesion is marginal (+0.01).
    members_snapshot: [eth, sol, ada, sui, avax, hbar, near, etc, algo, apt, inj, stx,
                        sei, xtz, mon, cfx, pol, ip, bera, 0g, kite, tao, theta, vana,
                        cc, night, move]

  # ---------------------------------------------------------------------------
  # RESIDUAL labels — intra-group corr indistinguishable from null; demean is
  # ~a no-op; POOLED into OTHER in the production group_neut kernel
  # ---------------------------------------------------------------------------

  - name: defi
    cohesion_mean_resid_corr: +0.002
    role: RESIDUAL
    definition: >
      On-chain financial-application tokens: spot / perp DEXes, lending protocols,
      stablecoin issuers, liquid-staking / restaking governance, asset management,
      yield, RWA issuers, NFT marketplaces and NFT-collateralized lending, and token
      launchpads. The label is about the MECHANISM (an on-chain financial protocol),
      regardless of whether the token currently captures fees: blur is defi (NFT
      marketplace + Blend NFT-lending) even though its fee switch is unpassed; virtual
      is defi (bonding-curve launchpad + DEX, pump.fun->Raydium analog). Statistically
      residual (large bucket, no shared post-market factor) but economically real;
      candidate for sub-division (dex / lending / lsd / rwa / perps) once each sub-leaf
      has >=3 live members. Pooled to OTHER in the group_neut kernel.
    members_snapshot: [uni, aave, crv, jup, pump, hype, dydx, snx, aster, comp, morpho,
                        sky, ena, ldo, jto, ethfi, eigen, pendle, ondo, wlfi, blur, virtual]

  - name: information_technology
    cohesion_mean_resid_corr: +0.004
    role: RESIDUAL
    definition: >
      On-chain SERVICE / access / middleware tokens that are NOT themselves a chain,
      a physical-resource DePIN, an oracle, a captive single-operator franchise, or a
      financial protocol. Spans: token-hold access-gating to off-chain SaaS / data
      services (aixbt market-intel, sahara data-services, shell / MyShell agent SaaS,
      coai agent API), human-data-service coordination with on-chain stake but off-
      chain output (sapien data-labeling), on-chain reputation / curation / discovery
      services (recall), identity / naming / dev-tooling middleware (ens, wld proof-of-
      personhood, grt, kaito), ZK-prover infrastructure (prove, la, zbt — carve a
      verifiable_compute label once >=3 sub-leaf members are live), and single-operator
      payment / ad-routing middleware (bat / Brave, ach payment rail). Reclassified to
      RESIDUAL (2026-06-20): after the ai_infrastructure dissolution placed the mechanism-
      correct access/data-service tokens here, the bucket's cohesion fell to ~0.004
      (effect-size residual, like defi) — it is a negative-space services bucket, not a
      cohesive factor. A SECONDARY buyback does not promote a SaaS-access token to
      captive_franchise (aixbt stays IT); off-chain dataset output is not an on-chain
      verified feed (sapien is IT, not oracles_data). Pooled to OTHER in group_neut;
      a live candidate for the next mechanism-based re-audit.
    members_snapshot: [ens, grt, wld, kaito, arkm, mask, ssv, sign, aixbt, sahara, shell,
                        coai, sapien, recall, bat, ach, prove, la, zbt, 2z, parti, pieverse]

  - name: oracles_data
    cohesion_mean_resid_corr: -0.00
    role: RESIDUAL
    definition: >
      Tokens whose value accrues from selling verified data INTO smart contracts:
      per-query feed fees, dispute bonds, data verification. A sovereign appchain whose
      ONLY output is a verified data / prediction feed (and which hosts no third-party
      contracts) belongs here, not smart_contract_platform: allo (Allora) is an appchain
      that outputs only scored ML prediction feeds consumed on-chain by external dApps —
      an oracle network, not a general execution platform. Statistically residual
      (intra-group corr ~null). Pooled to OTHER in the group_neut kernel.
    members_snapshot: [link, pyth, api3, band, trb, uma, at, truth, allo]

  - name: OTHER
    cohesion_mean_resid_corr: null
    role: RESIDUAL
    definition: >
      Non-directional residual and per-day n<3 collapse target. Two populations:
      (1) Non-directional instruments (tokenized commodities, claim tokens) — excluded
          from the permutation validation universe; the n>=3 floor does not apply.
      (2) Near-dead chains with no live directional driver: luna (Terra 2.0), ethw,
          icx, one (Harmony), lrc (Loopring). The OTHER bar is the ABSENCE of a live
          directional driver, NOT the absence of an L1 mechanism, and NOT a not-yet-
          live aspirational mechanism (those go to their live mechanism's home, e.g.
          sahara -> information_technology while its L1 is testnet).
      In the group_neut kernel: RESIDUAL-labelled coins (defi, information_technology,
      oracles_data) are also pooled here per day, then market-neutralized as a single
      OTHER pool. Any FACTOR group with <3 live members on a given day collapses to
      OTHER for that day.
    members_snapshot: [luna, ethw, icx, one, lrc]

# =============================================================================
# PRECEDENCE / BOUNDARY RULES  (apply in order; first matching rule wins)
# =============================================================================

precedence_rules:

  - rule: 1
    name: derivative_wrapper
    text: >
      A token whose value is contractually derived from an underlying asset or
      claim (tokenized commodities, claim tokens) -> OTHER (non-directional pool),
      regardless of host chain or issuer.

  - rule: 2
    name: meme
    text: >
      A token whose value proposition to holders is community / attention with no
      cash-flow, fee, or utility claim -> meme, regardless of host chain and EVEN IF a
      live product exists (the test is zero holder value-accrual: zora). Meme identity
      beats chain: bonk / wif / pengu stay meme despite Solana.

  - rule: 3
    name: tron_cashflow_settlement
    text: >
      TRX -> value_transfer. TRX's value accrual is chain-native USDT-settlement
      fee / burn — an OPEN settlement rail alongside xrp / xlm with no single captive
      off-chain operator (the captive_franchise discriminator, Rule 4).

  - rule: 4
    name: captive_franchise
    text: >
      A token whose value is captured OFF-chain by a SINGLE operator and recycled to
      holders (burn / buyback / discount / discretionary revenue-share) ->
      captive_franchise, regardless of host chain or nominal application function. The
      decisive test is "is there a single captive off-chain operator feeding the flow?"
      Resolved members: bnb (Binance), cro (Crypto.com), okb (OKX), ton (Telegram),
      nmr (Numerai single-company fund tournament), me (Magic Eden Inc NFT-marketplace
      operator). TRX fails this test (open rail, no single operator) and is value_transfer.
      Rule 4 is ordered before Rule 5.

  - rule: 5
    name: function_beats_chain_applications
    text: >
      An application token goes to its functional mechanism group (defi, oracles_data,
      information_technology, compute_storage, metaverse_gaming) regardless of host
      chain. jup / ray / kmno stay defi despite Solana.

  - rule: 6
    name: settlement_dependence_chains
    text: >
      A chain token whose execution layer settles to Ethereum AND whose fee revenue
      derives from scaling Ethereum -> eth_scaling. Sidechains with their own validator
      sets are NOT eth_scaling even if EVM-compatible (pol runs its own validator set).
      A token securing cross-chain messaging, shared security, or build-your-own-chain
      hubs -> interoperability. A sovereign-consensus general-purpose L1 ->
      smart_contract_platform.

  - rule: 7
    name: compute_storage
    text: >
      A token that is the metered payment / settlement unit and / or slashable provider
      stake of a decentralized PHYSICAL-RESOURCE marketplace — compute (CPU / GPU),
      storage, or bandwidth -> compute_storage. The resource type (GPU vs disk vs
      bandwidth) and the settlement style (burn-or-lock vs pay-the-provider) are NOT
      boundaries: render / glm / ath / grass (paid-provider compute / bandwidth) and
      fil / ar / wal / icp (burn-or-lock storage / compute) are one mechanism. Young
      listings are classified on protocol economics, not realized correlation (wal).

  - rule: 8
    name: currency
    text: >
      A native currency of a non-smart-contract chain -> privacy if transaction-level
      privacy is the primary protocol feature (zec, dash, zen), else value_transfer
      (store-of-value and payment / settlement coins including xrp, xlm, trx by Rule 3).

  - rule: 9
    name: flagship_resource_beats_generic_gas
    text: >
      When a sovereign-L1 form and a flagship metered physical-resource mechanism
      coexist, the resource wins ONLY if it is a STANDALONE priced market: icp (cycles-
      burn cloud compute) -> compute_storage. But a modular / app-specific L1 whose
      compute / storage / DA / data modules settle THROUGH its own chain (no standalone
      resource market priced in the token) stays smart_contract_platform: 0g, theta,
      vana. The token's accrual point (L1 gas / staking vs a metered resource market)
      decides, never the AI / data narrative.

  - rule: 10
    name: residual_honesty
    text: >
      If no rule fires cleanly, assign the broadest applicable economic parent
      (smart_contract_platform, defi, information_technology), register the asset in the
      exception register (decisions/), and never invent a group to house it. A
      statistical misfit stays in its economic home unless an economic re-reading
      justifies the move (the TRX precedent standard).

  - rule: 11
    name: narrative_is_not_mechanism
    text: >
      An application or marketing narrative ("AI", "media/content") is NOT a sector and
      never determines placement; classify by the underlying whitepaper / code mechanism.
      An AI-marketed sovereign L1 -> smart_contract_platform (0g, kite, tao, theta, vana);
      an AI-marketed GPU / compute / bandwidth market -> compute_storage (render, glm, ath,
      grass, lpt); an AI-marketed access / data-service token with no chain and no metered
      on-chain resource -> information_technology (aixbt, sahara, sapien, shell, coai, recall);
      an AI-marketed verified-feed network -> oracles_data (allo); an AI-marketed launchpad ->
      defi (virtual). The ai_infrastructure and media_content labels were DISSOLVED
      (2026-06-20): both were narrative buckets with ~zero / negative cohesion (the data
      agreed they were not real groups), and their members were redistributed by mechanism.
      See decisions/dissolve-ai-narrative.md.

# =============================================================================
# FACTOR / RESIDUAL GOVERNANCE
# =============================================================================
# Each label is tagged FACTOR or RESIDUAL by EFFECT SIZE — its mean intra-group
# market-residual pairwise correlation vs a size-preserving 10,000-perm null — NOT
# by p-value alone (a large bucket can be p-significant with ~zero effect; defi and
# information_technology are p<0.01 but RESIDUAL by effect size).
# Source: validation/sector_okx/cohesion_sector.csv.
#
# group_neut POLICY (production OTHER-collapse kernel):
#   Per day:
#   - Demean returns WITHIN each FACTOR sector with >=3 live members.
#   - Pool RESIDUAL-labelled coins AND any sub-3-member FACTOR group into OTHER,
#     then demean that OTHER pool (market-neutralize).
#   This kernel is conservative; a naive "demean within every label" overstates VR.
#
# FACTOR summary (mean market-residual intra-group corr, 13-label field):
#   STRONG:   privacy (+0.55), value_transfer (+0.23), captive_franchise (+0.17),
#             meme (+0.09), compute_storage (+0.06)
#   WEAK:     eth_scaling (+0.04), metaverse_gaming (+0.04), interoperability (+0.03)
#   MARGINAL: smart_contract_platform (+0.010)
#
# RESIDUAL (pooled to OTHER in group_neut):
#   information_technology (+0.004), defi (+0.002), oracles_data (~0.00),
#   OTHER (residual by design)
#
# HONESTY NOTES:
#   - information_technology is RESIDUAL as of 2026-06-20: it is a negative-space
#     services bucket (defined by what it is NOT), and after absorbing the mechanism-
#     correct access / data-service tokens from the dissolved ai_infrastructure it no
#     longer coheres (0.004). It is the leading candidate for the next mechanism re-audit.
#   - compute_storage was widened to include paid-provider GPU / compute / bandwidth
#     DePINs (render / glm / ath / grass / lpt); cohesion diluted from +0.18 (n=4) to
#     +0.06 (n=9) but remains a clear FACTOR — GPU and storage DePINs genuinely co-move.
#   - The big buckets (smart_contract_platform, defi, information_technology) are mostly
#     market beta; significance comes from large n, not strong cohesion.
#   - NOT A RISK MODEL: this is a validated classification (an input to a risk model's
#     exposure matrix), not a covariance / factor risk model.
#   - Deployment gate: validated for research + group-neutralization; alpha-capital
#     deployment is paper-trading-gated.
# =============================================================================

